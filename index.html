<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body{font-family:Arial;padding:20px}
    table{width:100%;border-collapse:collapse;margin-top:15px}
    th,td{border:1px solid #ccc;padding:8px;text-align:left}
    th{background:#eee}
    tbody tr:nth-child(even){background:#f9f9f9}
    tbody tr:hover{background:#eaf3ff}
    #name-th{cursor:pointer}
    input,button{padding:6px;margin:2px}
  </style>
</head>
<body>
  <input id="input-name" placeholder="Tên sản phẩm">
  <input id="input-category" placeholder="Danh mục">
  <input id="input-price" type="number" placeholder="Đơn giá">
  <input id="input-quantity" type="number" placeholder="Số lượng">
  <button id="btn-add" type="button">Thêm</button>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="name-th">Tên sản phẩm</th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let products = [];
    let asc = true;

    const tbody = document.querySelector("#product-table tbody");
    const nameTh = document.getElementById("name-th");

    function render() {
      tbody.innerHTML = "";
      for (let i = 0; i < products.length; i++) {
        const p = products[i];
        tbody.innerHTML += `
          <tr>
            <td>${i + 1}</td>
            <td>${p.name}</td>
            <td>${p.category || ""}</td>
            <td>${p.price}</td>
            <td>${p.quantity}</td>
          </tr>
        `;
      }
    }

    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        products = JSON.parse(xhr.responseText);
        render();
      }
    };
    xhr.open("GET", "products.json", true);
    xhr.send();

    nameTh.onclick = function () {
      products.sort(function(a, b) {
        const x = (a.name || "").toLowerCase();
        const y = (b.name || "").toLowerCase();
        if (x < y) return asc ? -1 : 1;
        if (x > y) return asc ? 1 : -1;
        return 0;
      });
      nameTh.innerHTML = "Tên sản phẩm " + (asc ? "▲" : "▼");
      asc = !asc;
      render();
    };

    document.getElementById("btn-add").onclick = function () {
      const name = document.getElementById("input-name").value.trim();
      const category = document.getElementById("input-category").value.trim();
      const price = document.getElementById("input-price").value;
      const quantity = document.getElementById("input-quantity").value;

      if (name === "" || price === "" || quantity === "") return;

      products.push({
        id: products.length + 1,
        name: name,
        category: category,
        price: price,
        quantity: quantity
      });

      render();

      document.getElementById("input-name").value = "";
      document.getElementById("input-category").value = "";
      document.getElementById("input-price").value = "";
      document.getElementById("input-quantity").value = "";
    };
  </script>
</body>
</html>
