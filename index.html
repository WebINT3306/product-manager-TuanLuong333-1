<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body{font-family:Arial;padding:20px}
    input,button{padding:6px;margin:2px}
    table{width:100%;border-collapse:collapse;margin-top:15px}
    th,td{border:1px solid #ccc;padding:8px;text-align:left}
    th{background:#eee}
    tbody tr:nth-child(even){background:#f9f9f9}
    tbody tr:hover{background:#eaf3ff}
    #th-name{cursor:pointer}
  </style>
</head>
<body>
  <input id="input-name" type="text" placeholder="Ten san pham">
  <input id="input-category" type="text" placeholder="Danh muc">
  <input id="input-price" type="number" placeholder="Don gia">
  <input id="input-quantity" type="number" placeholder="So luong">
  <button id="btn-add" type="button">Them</button>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="th-name">Ten san pham</th>
        <th>Danh muc</th>
        <th>Don gia</th>
        <th>So luong</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    var products = [];
    var loaded = false;
    var asc = true;

    var tbody = document.querySelector("#product-table tbody");
    var thName = document.getElementById("th-name");
    var btnAdd = document.getElementById("btn-add");

    function renderTable() {
      var html = "";
      for (var i = 0; i < products.length; i++) {
        html += "<tr>" +
          "<td>" + (i + 1) + "</td>" +
          "<td>" + products[i].name + "</td>" +
          "<td>" + (products[i].category || "") + "</td>" +
          "<td>" + products[i].price + "</td>" +
          "<td>" + products[i].quantity + "</td>" +
          "</tr>";
      }
      tbody.innerHTML = html;
    }

    function loadProducts() {
      var xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
          var data = JSON.parse(xhr.responseText);
          products = data.concat(products);
          loaded = true;
          renderTable();
        }
      };
      xhr.open("GET", "products.json", true);
      xhr.send();
    }

    thName.onclick = function() {
      products.sort(function(a, b) {
        var x = String(a.name).toLowerCase();
        var y = String(b.name).toLowerCase();
        if (x < y) return asc ? -1 : 1;
        if (x > y) return asc ? 1 : -1;
        return 0;
      });
      thName.innerHTML = "Ten san pham " + (asc ? "▲" : "▼");
      asc = !asc;
      renderTable();
    };

    btnAdd.onclick = function() {
      var name = document.getElementById("input-name").value.trim();
      var category = document.getElementById("input-category").value.trim();
      var price = document.getElementById("input-price").value;
      var quantity = document.getElementById("input-quantity").value;

      if (name === "" || price === "" || quantity === "") return;

      products.push({
        id: products.length + 1,
        name: name,
        category: category,
        price: price,
        quantity: quantity
      });

      renderTable();

      document.getElementById("input-name").value = "";
      document.getElementById("input-category").value = "";
      document.getElementById("input-price").value = "";
      document.getElementById("input-quantity").value = "";
    };

    window.onload = function() {
      loadProducts();
    };
  </script>
</body>
</html>
