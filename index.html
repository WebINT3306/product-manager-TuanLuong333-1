<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body{font-family:Arial,sans-serif;padding:20px}
    table{width:100%;border-collapse:collapse;margin-top:20px}
    th,td{border:1px solid #ccc;padding:8px;text-align:left}
    th{background:#eee}
    tbody tr:nth-child(even){background:#f9f9f9}
    tbody tr:hover{background:#eaf3ff}
    #sortable-name{cursor:pointer}
    input,button{margin:4px 0;padding:6px}
  </style>
</head>
<body>
  <h2>Quản lý sản phẩm</h2>

  <input id="input-name" placeholder="Tên sản phẩm">
  <input id="input-category" placeholder="Danh mục">
  <input id="input-price" type="number" placeholder="Đơn giá">
  <input id="input-quantity" type="number" placeholder="Số lượng">
  <button id="btn-add">Thêm</button>

  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="sortable-name">Tên sản phẩm</th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    let products = [], asc = true;
    const tbody = document.querySelector("#product-table tbody");
    const thName = document.getElementById("sortable-name");

    function render() {
      tbody.innerHTML = "";
      products.forEach((p, i) => {
        tbody.innerHTML += `
          <tr>
            <td>${i + 1}</td>
            <td>${p.name}</td>
            <td>${p.category || ""}</td>
            <td>${p.price}</td>
            <td>${p.quantity}</td>
          </tr>`;
      });
    }

    const xhr = new XMLHttpRequest();
    xhr.onreadystatechange = function () {
      if (xhr.readyState === 4 && xhr.status === 200) {
        products = JSON.parse(xhr.responseText);
        render();
      }
    };
    xhr.open("GET", "products.json");
    xhr.send();

    thName.onclick = function () {
      products.sort((a, b) =>
        asc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name)
      );
      thName.innerHTML = "Tên sản phẩm " + (asc ? "▲" : "▼");
      asc = !asc;
      render();
    };

    document.getElementById("btn-add").onclick = function () {
      const name = document.getElementById("input-name").value.trim();
      const category = document.getElementById("input-category").value.trim();
      const price = +document.getElementById("input-price").value;
      const quantity = +document.getElementById("input-quantity").value;

      if (name.length < 3 || price <= 0 || !Number.isInteger(quantity) || quantity < 1) return;

      products.push({ id: products.length + 1, name, category, price, quantity });
      render();

      document.getElementById("input-name").value = "";
      document.getElementById("input-category").value = "";
      document.getElementById("input-price").value = "";
      document.getElementById("input-quantity").value = "";
    };
  </script>
</body>
</html>
